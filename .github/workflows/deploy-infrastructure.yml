name: Deploy Hub-Spoke Infrastructure

on:
  push:
    branches: [master]
    paths: ['infrastructure/**']
  pull_request:
    branches: [master]
    paths: ['infrastructure/**']
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'dev'
        type: choice
        options: [dev, test, prod]

# Prevent concurrent deployments to the same environment — a second run
# queues and waits rather than racing against an in-progress deployment.
concurrency:
  group: deploy-${{ github.event.inputs.environment || 'validate' }}
  cancel-in-progress: false

# Minimal permissions at workflow level; each job adds only what it needs.
permissions:
  contents: read

jobs:
  # ── Validate (runs on every PR and push) ──────────────────────────────────
  validate:
    name: Validate Bicep
    runs-on: ubuntu-latest
    permissions:
      id-token: write   # OIDC login to Azure
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Bicep build (lint)
        run: az bicep build --file infrastructure/main.bicep

      - name: What-if — dev
        run: |
          az deployment sub what-if \
            --location uksouth \
            --template-file infrastructure/main.bicep \
            --parameters infrastructure/parameters/dev.bicepparam

  # ── Deploy DEV ─────────────────────────────────────────────────────────────
  deploy-dev:
    name: Deploy → dev
    needs: validate
    runs-on: ubuntu-latest
    environment: dev
    permissions:
      id-token: write
      contents: read
    if: github.ref == 'refs/heads/master' || (github.event_name == 'workflow_dispatch' && inputs.environment == 'dev')
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy to dev
        run: |
          az deployment sub create \
            --name hub-spoke-dev-${{ github.run_number }} \
            --location uksouth \
            --template-file infrastructure/main.bicep \
            --parameters infrastructure/parameters/dev.bicepparam

  # ── Deploy TEST ────────────────────────────────────────────────────────────
  deploy-test:
    name: Deploy → test
    needs: validate
    runs-on: ubuntu-latest
    environment: test
    permissions:
      id-token: write
      contents: read
    if: github.event_name == 'workflow_dispatch' && inputs.environment == 'test'
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy to test
        run: |
          az deployment sub create \
            --name hub-spoke-test-${{ github.run_number }} \
            --location uksouth \
            --template-file infrastructure/main.bicep \
            --parameters infrastructure/parameters/test.bicepparam

  # ── Deploy PROD ────────────────────────────────────────────────────────────
  deploy-prod:
    name: Deploy → prod
    needs: validate
    runs-on: ubuntu-latest
    environment: prod
    permissions:
      id-token: write
      contents: read
    if: github.event_name == 'workflow_dispatch' && inputs.environment == 'prod'
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy to prod
        run: |
          az deployment sub create \
            --name hub-spoke-prod-${{ github.run_number }} \
            --location uksouth \
            --template-file infrastructure/main.bicep \
            --parameters infrastructure/parameters/prod.bicepparam
