name: Teardown Hub-Spoke Infrastructure

# ─────────────────────────────────────────────────────────────────────────────
# PURPOSE
#   This workflow deletes all resource groups for a given environment.
#   All infrastructure is 100% code-defined — deletion is safe and reversible.
#   Re-running deploy-infrastructure.yml fully restores any torn-down environment.
#
# TRIGGERS
#   1. Scheduled  — dev torn down automatically every weeknight at 22:00 UTC
#   2. Manual     — workflow_dispatch lets you choose dev / test / prod / all
#
# SAFETY
#   • prod requires a GitHub Environment reviewer approval before deletion runs
#   • A confirmation string ('delete-prod') must be typed for prod
#   • dev and test are torn down without approval (POC cost-saving)
# ─────────────────────────────────────────────────────────────────────────────

on:
  # Nightly auto-teardown of dev — saves ~£1,058/month if redeployed each morning
  schedule:
    - cron: '0 22 * * 1-5'   # 22:00 UTC, Monday–Friday

  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to tear down'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - test
          - prod
          - all
      confirm_prod:
        description: 'Type "delete-prod" to confirm production teardown (ignored for dev/test)'
        required: false
        default: ''

permissions:
  id-token: write
  contents: read

env:
  NAME_PREFIX: contoso

jobs:
  # ── Guard: block prod teardown without explicit confirmation ────────────────
  safety-check:
    name: Safety Check
    runs-on: ubuntu-latest
    outputs:
      proceed: ${{ steps.check.outputs.proceed }}
    steps:
      - name: Validate prod confirmation
        id: check
        run: |
          ENV="${{ github.event.inputs.environment || 'dev' }}"
          CONFIRM="${{ github.event.inputs.confirm_prod }}"

          if [[ "$ENV" == "prod" || "$ENV" == "all" ]]; then
            if [[ "$CONFIRM" != "delete-prod" ]]; then
              echo "❌ Production teardown requires confirm_prod = 'delete-prod'"
              echo "   You entered: '$CONFIRM'"
              echo "proceed=false" >> $GITHUB_OUTPUT
              exit 1
            fi
          fi
          echo "proceed=true" >> $GITHUB_OUTPUT
          echo "✅ Safety check passed for environment: $ENV"

  # ── Capture assets for ALL targeted environments (runs before any deletion) ──
  capture-assets:
    name: Capture Assets
    needs: safety-check
    if: needs.safety-check.outputs.proceed == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (for IaC source snapshot)
        uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Capture resources, ARM exports, network topology and costs
        env:
          ENV_INPUT: ${{ github.event.inputs.environment || 'dev' }}
          NAME_PREFIX: ${{ env.NAME_PREFIX }}
        run: |
          set -euo pipefail
          TIMESTAMP=$(date -u +%Y%m%dT%H%M%SZ)
          BASE="teardown-assets/${TIMESTAMP}"

          capture_env() {
            local env="$1"
            local out="${BASE}/${env}"
            mkdir -p "$out"

            echo "──── Capturing: ${env} ────"
            local rgs=(
              "rg-${NAME_PREFIX}-hub-${env}"
              "rg-${NAME_PREFIX}-spoke-${env}"
              "rg-${NAME_PREFIX}-storage-${env}"
            )

            for rg in "${rgs[@]}"; do
              if az group exists --name "$rg" | grep -q true; then
                echo "  Resource list → $rg"
                az resource list --resource-group "$rg" \
                  --query "[].{name:name,type:type,location:location,sku:sku.name}" \
                  -o table > "${out}/${rg}-resources.txt" 2>/dev/null || true

                echo "  ARM export   → $rg"
                az group export --name "$rg" --include-parameter-default-value \
                  -o json > "${out}/${rg}-arm-export.json" 2>/dev/null || \
                  echo "    ARM export skipped (unsupported type in $rg)"

                START=$(date -u -d '30 days ago' +%Y-%m-%d)
                END=$(date -u +%Y-%m-%d)
                SUB=$(az account show --query id -o tsv)
                echo "  Cost data    → $rg"
                az consumption usage list \
                  --start-date "$START" --end-date "$END" \
                  --scope "/subscriptions/${SUB}/resourceGroups/$rg" \
                  --query "[].{date:usageStart,resource:instanceName,cost:pretaxCost,currency:currency}" \
                  -o table > "${out}/${rg}-cost.txt" 2>/dev/null || \
                  echo "    Cost data unavailable (requires Billing Reader role)"
              else
                echo "  Skipped (not found): $rg"
              fi
            done

            local hub_rg="rg-${NAME_PREFIX}-hub-${env}"
            if az group exists --name "$hub_rg" | grep -q true; then
              echo "  Network topology → ${env}"
              az network watcher show-topology \
                --resource-group "$hub_rg" \
                -o json > "${out}/network-topology.json" 2>/dev/null || true

              local appgw="agw-${NAME_PREFIX}-${env}"
              if az network application-gateway show \
                   --name "$appgw" --resource-group "$hub_rg" &>/dev/null; then
                echo "  App Gateway config → ${appgw}"
                az network application-gateway show \
                  --name "$appgw" --resource-group "$hub_rg" \
                  -o json > "${out}/app-gateway.json" 2>/dev/null || true
              fi
            fi

            echo "  ✅ Done: ${env}"
          }

          case "$ENV_INPUT" in
            dev)  capture_env dev ;;
            test) capture_env test ;;
            prod) capture_env prod ;;
            all)
              capture_env dev
              capture_env test
              capture_env prod
              ;;
          esac

          # Copy IaC source into the bundle so the artifact is self-contained
          cp -r infrastructure "${BASE}/iac-source"

          echo "ASSET_DIR=${BASE}" >> $GITHUB_ENV
          echo "Captured assets in ${BASE}/"
          find "$BASE" -type f | sort

      - name: Upload asset bundle as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: teardown-assets-${{ github.run_id }}
          path: teardown-assets/
          retention-days: 90

      - name: Write capture summary
        run: |
          echo "## Asset Capture" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Artifact **teardown-assets-${{ github.run_id }}** uploaded (retained 90 days)." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| File | Description |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| \`*-resources.txt\` | Full resource list per RG |" >> $GITHUB_STEP_SUMMARY
          echo "| \`*-arm-export.json\` | Deployed ARM state (redeployable) |" >> $GITHUB_STEP_SUMMARY
          echo "| \`network-topology.json\` | Hub VNet topology snapshot |" >> $GITHUB_STEP_SUMMARY
          echo "| \`app-gateway.json\` | WAF v2 config |" >> $GITHUB_STEP_SUMMARY
          echo "| \`*-cost.txt\` | Last 30-day cost breakdown |" >> $GITHUB_STEP_SUMMARY
          echo "| \`iac-source/\` | Full Bicep IaC at time of teardown |" >> $GITHUB_STEP_SUMMARY

  # ── Teardown DEV ────────────────────────────────────────────────────────────
  teardown-dev:
    name: Teardown → dev
    needs: [safety-check, capture-assets]
    if: |
      needs.safety-check.outputs.proceed == 'true' &&
      (github.event_name == 'schedule' ||
       github.event.inputs.environment == 'dev' ||
       github.event.inputs.environment == 'all')
    runs-on: ubuntu-latest
    environment: dev
    steps:
      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Delete dev resource groups
        run: |
          echo "🗑️  Tearing down dev environment..."
          for rg in \
            rg-${{ env.NAME_PREFIX }}-hub-dev \
            rg-${{ env.NAME_PREFIX }}-spoke-dev \
            rg-${{ env.NAME_PREFIX }}-storage-dev; do
            if az group exists --name "$rg" | grep -q true; then
              echo "  Deleting: $rg"
              az group delete --name "$rg" --yes --no-wait
            else
              echo "  Already gone: $rg"
            fi
          done
          echo "⏳ Deletion submitted (async). Azure will complete within ~5 minutes."

      - name: Verify deletion
        run: |
          echo "Waiting 60s before checking status..."
          sleep 60
          for rg in \
            rg-${{ env.NAME_PREFIX }}-hub-dev \
            rg-${{ env.NAME_PREFIX }}-spoke-dev \
            rg-${{ env.NAME_PREFIX }}-storage-dev; do
            STATE=$(az group show --name "$rg" --query properties.provisioningState -o tsv 2>/dev/null || echo 'Deleted')
            echo "  $rg → $STATE"
          done

  # ── Teardown TEST ───────────────────────────────────────────────────────────
  teardown-test:
    name: Teardown → test
    needs: [safety-check, capture-assets]
    if: |
      needs.safety-check.outputs.proceed == 'true' &&
      (github.event.inputs.environment == 'test' ||
       github.event.inputs.environment == 'all')
    runs-on: ubuntu-latest
    environment: test
    steps:
      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Delete test resource groups
        run: |
          echo "🗑️  Tearing down test environment..."
          for rg in \
            rg-${{ env.NAME_PREFIX }}-hub-test \
            rg-${{ env.NAME_PREFIX }}-spoke-test \
            rg-${{ env.NAME_PREFIX }}-storage-test; do
            if az group exists --name "$rg" | grep -q true; then
              echo "  Deleting: $rg"
              az group delete --name "$rg" --yes --no-wait
            else
              echo "  Already gone: $rg"
            fi
          done
          echo "⏳ Deletion submitted (async)."

  # ── Teardown PROD (requires GitHub Environment reviewer approval) ────────────
  teardown-prod:
    name: Teardown → prod
    needs: [safety-check, capture-assets]
    if: |
      needs.safety-check.outputs.proceed == 'true' &&
      (github.event.inputs.environment == 'prod' ||
       github.event.inputs.environment == 'all')
    runs-on: ubuntu-latest
    environment: prod          # ← manual reviewer approval gate in GitHub Environments
    steps:
      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Delete prod resource groups
        run: |
          echo "🗑️  Tearing down PRODUCTION environment..."
          for rg in \
            rg-${{ env.NAME_PREFIX }}-hub-prod \
            rg-${{ env.NAME_PREFIX }}-spoke-prod \
            rg-${{ env.NAME_PREFIX }}-storage-prod; do
            if az group exists --name "$rg" | grep -q true; then
              echo "  Deleting: $rg"
              az group delete --name "$rg" --yes --no-wait
            else
              echo "  Already gone: $rg"
            fi
          done
          echo "⏳ Deletion submitted (async)."

  # ── Summary ─────────────────────────────────────────────────────────────────
  summary:
    name: Teardown Summary
    needs: [capture-assets, teardown-dev, teardown-test, teardown-prod]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Print summary
        run: |
          echo "## Teardown Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Step | Result |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Asset capture | ${{ needs.capture-assets.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| dev teardown  | ${{ needs.teardown-dev.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| test teardown | ${{ needs.teardown-test.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| prod teardown | ${{ needs.teardown-prod.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Artifact:** teardown-assets-${{ github.run_id }} (90-day retention)" >> $GITHUB_STEP_SUMMARY
          echo "Download from: Actions → this run → Artifacts" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "To redeploy any environment: run **Deploy Hub-Spoke Infrastructure** workflow_dispatch." >> $GITHUB_STEP_SUMMARY
