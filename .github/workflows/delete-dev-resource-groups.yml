name: Delete Dev Resource Groups

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type DELETE to confirm deletion of all dev resource groups'
        required: true
        type: string

permissions:
  id-token: write
  contents: read

jobs:
  delete-dev:
    name: Delete dev resource groups
    runs-on: ubuntu-latest
    environment: dev
    if: inputs.confirm == 'DELETE'

    steps:
      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Delete rg-contoso-hub-dev
        run: |
          if az group show --name rg-contoso-hub-dev &>/dev/null; then
            echo "Deleting rg-contoso-hub-dev..."
            az group delete --name rg-contoso-hub-dev --yes --no-wait
            echo "Deletion triggered for rg-contoso-hub-dev."
          else
            echo "rg-contoso-hub-dev does not exist, skipping."
          fi

      - name: Delete rg-contoso-spoke-dev
        run: |
          if az group show --name rg-contoso-spoke-dev &>/dev/null; then
            echo "Deleting rg-contoso-spoke-dev..."
            az group delete --name rg-contoso-spoke-dev --yes --no-wait
            echo "Deletion triggered for rg-contoso-spoke-dev."
          else
            echo "rg-contoso-spoke-dev does not exist, skipping."
          fi

      - name: Delete rg-contoso-storage-dev
        run: |
          if az group show --name rg-contoso-storage-dev &>/dev/null; then
            echo "Deleting rg-contoso-storage-dev..."
            az group delete --name rg-contoso-storage-dev --yes --no-wait
            echo "Deletion triggered for rg-contoso-storage-dev."
          else
            echo "rg-contoso-storage-dev does not exist, skipping."
          fi

      - name: Summary
        run: |
          echo "### Dev Resource Group Deletion" >> $GITHUB_STEP_SUMMARY
          echo "| Resource Group | Action |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| rg-contoso-hub-dev | Deletion triggered |" >> $GITHUB_STEP_SUMMARY
          echo "| rg-contoso-spoke-dev | Deletion triggered |" >> $GITHUB_STEP_SUMMARY
          echo "| rg-contoso-storage-dev | Deletion triggered |" >> $GITHUB_STEP_SUMMARY
          echo "| Time (UTC) | $(date -u) |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "> Deletions run async (--no-wait). Allow a few minutes for Azure to complete removal." >> $GITHUB_STEP_SUMMARY
